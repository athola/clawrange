# AI MSP Testbed — Minimal Stack (OpenClaw + n8n only)
# Use this for quick iteration when DeerFlow research layer isn't needed.
# Usage: docker compose -f docker-compose.minimal.yml up -d

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: msp-openclaw
    ports:
      - "${OPENCLAW_PORT:-3000}:18789"
    volumes:
      - ./openclaw/soul.md:/home/node/.openclaw/soul.md:ro
      - ./openclaw/config/openclaw.json:/home/node/.openclaw/openclaw.json:ro
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENCLAW_TZ=${TIMEZONE:-America/Chicago}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-testbed-token-change-me}
    command: ["node", "dist/index.js", "gateway", "--bind", "lan", "--port", "18789"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r=>{if(!r.ok)throw 1})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - msp-network

  n8n:
    image: n8nio/n8n:latest
    container_name: msp-n8n
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/workflows:ro
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - GENERIC_TIMEZONE=${TIMEZONE:-America/Chicago}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - msp-network

volumes:
  n8n_data:
    name: msp-n8n-data

networks:
  msp-network:
    name: msp-network
    driver: bridge

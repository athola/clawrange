name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: scripts
          severity: warning

      - name: Validate YAML
        run: |
          pip install --quiet yamllint
          yamllint -d relaxed docker-compose.yml docker-compose.minimal.yml deerflow/config.yaml

      - name: Validate JSON
        run: |
          for f in n8n/workflows/*.json openclaw/config/openclaw.json; do
            python3 -m json.tool "$f" > /dev/null && echo "OK: $f" || { echo "FAIL: $f"; exit 1; }
          done

      - name: Validate Docker Compose
        run: |
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.minimal.yml config --quiet

  python-tests:
    name: Python validation suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax check
        run: python3 -m py_compile tests/validate_stack.py

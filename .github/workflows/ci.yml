name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: scripts
          severity: warning

      - name: Validate YAML
        run: |
          pip install --quiet yamllint
          yamllint -d relaxed docker-compose.yml deerflow/config.yaml

      - name: Validate JSON
        run: |
          for f in n8n/workflows/*.json openclaw/config/openclaw.json; do
            python3 -m json.tool "$f" > /dev/null && echo "OK: $f" || { echo "FAIL: $f"; exit 1; }
          done

      - name: Validate Docker Compose
        run: |
          docker compose -f docker-compose.yml config --quiet

      - name: Scan for secrets
        run: |
          FOUND=0
          for pattern in 'sk-or-v1-[a-zA-Z0-9]' 'AKIA[0-9A-Z]' 'ghp_[a-zA-Z0-9]'; do
            if grep -rn "$pattern" --include='*.yml' --include='*.yaml' --include='*.json' --include='*.sh' --include='*.py' . 2>/dev/null | grep -v '.env.example' | grep -v '.git/'; then
              echo "FAIL: Possible secret matching pattern '$pattern'"
              FOUND=1
            fi
          done
          if [ "$FOUND" = "1" ]; then exit 1; fi
          echo "OK: No secrets detected"

  python-tests:
    name: Python validation suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run validation suite
        run: python3 tests/validate_stack.py

      - name: Run unit tests
        run: |
          pip install --quiet pytest
          python3 -m pytest tests/test_validate_stack.py -v

repos:
  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]

  # General file hygiene + basic secret detection
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: detect-private-key

  # Secret scanning — catches API keys, tokens, passwords
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks

  # Python linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Docker compose validation
  - repo: https://github.com/IamTheFij/docker-pre-commit
    rev: v3.0.1
    hooks:
      - id: docker-compose-check
        files: ^docker-compose\.yml$

  # Local guards — block operator identity/secrets the scanners miss.
  # gitleaks catches the Telegram *bot token* (it has a distinctive shape) but
  # not a bare-numeric *chat ID*, which would false-positive everywhere.
  - repo: local
    hooks:
      - id: forbid-hardcoded-telegram-id
        name: forbid hardcoded Telegram chat ID (use ${TELEGRAM_CHAT_ID})
        language: pygrep
        entry: '"(to|allowFrom)"\s*:\s*\[?\s*"[0-9]{6,}"'
        files: ^openclaw/config/.*\.json$
      - id: forbid-operator-private
        name: operator-private files must stay local (not committed)
        language: fail
        entry: "Operator-private file staged — keep it local-only, do not commit."
        files: ^(openclaw/soul\.md$|config/profiles/local-)
